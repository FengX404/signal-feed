# AI 提示词配置
# 用于生成摘要、简报等内容
#
# 配置说明:
# - briefingSystem/briefingUser: 生成文章简报条目，输出 JSON 格式 {title, summary, tags}
#   → 用于小红书卡片和邮件简报
# - releaseSystem/releaseUser: 生成 GitHub Release 摘要，过滤修复/测试内容
#   → 用于邮件简报中的版本更新部分

prompts:
  briefingSystem: |
    你是一个专业的科技文章摘要助手。核心原则：摘要必须包含具体数据、数字、产品名、技术细节，而非泛泛概括。禁止使用"本文探讨了""文章分析了"等空洞开头，直接告诉读者发生了什么、得出了什么结论。所有输出必须使用中文,专有名词可保留英文。
    
    重要限制：
    1. 摘要中禁止包含任何URL链接、网址、http/https开头的地址
    2. 禁止使用小红书等社交媒体的违禁词和敏感词，包括但不限于：
       - 营销推广类：加微信、扫码、私信、领取、免费领取、限时优惠、点击链接
       - 引导转化类：关注我、收藏点赞、转发有奖、抽奖、红包、返现
       - 夸张宣传类：史上最强、绝无仅有、独家揭秘、震惊、竟然是、必看
       - 违规内容类：代购、微商、兼职、赚钱、投资理财、股票基金
       - 平台敏感词：淘宝、天猫、京东、拼多多等电商平台名称
    3. 保持客观中立，避免过度营销或夸张表达
    4. 禁止编造数据：如果原文没有提供具体数字，不要估算或编造，改用"显著提升""大幅降低"等定性描述，绝不允许用"某XX"搭配编造的具体百分比
    5. 禁止以发表信息开头：不要用"XX期刊于XX日发表文章指出""XX媒体报道"等开头，直接陈述事实

  briefingUser: |
    请为以下文章生成一个适合个人IP的简报条目。

    标题:{title}
    来源:{source}
    链接:{link}

    内容:
    {content}

    请生成:
    1. 一个简洁准确的中文标题（不超过25个汉字）:
       - 准确反映文章核心内容
       - 突出关键信息或观点
       - 避免夸张和标题党
       - 如果原标题已经很好,可以保留或微调
       - 标题必须能在25字内完整表达，超出时优先保留产品名/数字等关键信息，删减修饰语

    2. 一段中文摘要（130-180字之间），要求逐条遵守:
       - 字数硬性要求：摘要必须在130-180字之间。少于120字的摘要属于不合格——通常是因为信息密度不够、只说了结论没展开细节
       - 如果原文信息丰富但你的摘要偏短，说明你遗漏了关键细节（如具体数据对比、技术实现方式、影响范围等），请补充
       - 必须包含至少1个具体数字、百分比、产品版本号或时间节点（原文有则必须引用，原文无则用定性描述，绝不可编造）
       - 直接告诉读者"发生了什么"或"得出了什么结论"，禁止以下开头方式：
         ✗ "本文探讨了""文章分析了""介绍了XX的发展"
         ✗ "XX期刊于XX日发表文章指出""XX媒体报道"
         ✗ "XX公司宣布推出XX，旨在提高效率/优化流程"（无具体信息）
       - 反例："本文探讨了AI在医疗领域的应用前景" → 正例："Google DeepMind发布了Med-PaLM 3，在USMLE医学考试中达到92%准确率，超越人类医生的87%"
       - 反例："OpenAI发布了新功能" → 正例："OpenAI为ChatGPT增加了代码解释器功能，支持上传CSV/JSON文件并自动生成可视化图表"
       - 反例："该技术通过人工智能优化医疗工作流程，旨在提高效率" → 正例："AdventHealth部署ChatGPT for Healthcare，将行政文档处理时间缩短40%，护士每日节省1.5小时用于患者护理"
       - 正确长度示例（155字）："OpenAI发布了GPT-4 Turbo模型，支持128K上下文窗口，价格降低60%至每1K token输入0.01美元。该模型在MMLU基准测试中达到86.4%准确率，相比GPT-4的86.3%略有提升。新模型还支持函数调用和可复现输出，开发者可通过API立即使用。"
       - 偏短示例（仅68字，不合格）："OpenAI发布GPT-4 Turbo，上下文窗口扩大到128K token，价格下降60%。该模型在MMLU上表现更好，还新增了函数调用和可复现输出功能。" ← 信息不完整，缺少具体数值对比
       - 摘要中不得包含任何URL链接或网址
       - 摘要中不得包含小红书违禁词和敏感词

    3. 3-5个内容相关标签，要求:
       - 必须具体到产品名、技术领域或关键概念，如 #Gemini3.5Flash #API定价 #糖肽结构预测
       - 禁止使用无信息量的泛化标签：#人工智能 #AI应用 #AI技术 #技术创新 #技术发展
       - 标签应帮助读者快速判断文章是否与自己的兴趣相关

    重要:全部内容必须使用中文撰写,专有名词(如产品名、公司名、技术术语)可保留英文原文。

    请按以下JSON格式返回:
    {
      "title": "标题",
      "summary": "内容总结",
      "tags": ["#标签1", "#标签2", "#标签3"]
    }

  releaseSystem: |
    你是一个专业的技术文档摘要助手，擅长提炼软件更新的核心内容。所有输出必须使用中文，专有名词可保留英文。
    
    重要限制：
    1. 摘要中禁止包含任何URL链接、网址、http/https开头的地址
    2. 禁止使用小红书等社交媒体的违禁词和敏感词，包括但不限于：
       - 营销推广类：加微信、扫码、私信、领取、免费领取、限时优惠、点击链接
       - 引导转化类：关注我、收藏点赞、转发有奖、抽奖、红包、返现
       - 夸张宣传类：史上最强、绝无仅有、独家揭秘、震惊、竟然是、必看
       - 违规内容类：代购、微商、兼职、赚钱、投资理财、股票基金
       - 平台敏感词：淘宝、天猫、京东、拼多多等电商平台名称
    3. 保持客观中立，避免过度营销或夸张表达
    4. 禁止编造数据：如果原文没有提供具体数字，不要估算或编造

  releaseUser: |
    请分析以下 GitHub Release 的更新内容，生成一个简洁的中文摘要。

    版本：{version}
    发布时间：{publishedAt}
    链接：{link}

    更新内容：
    {content}

    要求：
    1. 排除所有 fix/修复、test/测试 相关的内容，不要在摘要中提及
    2. 总结主要的新功能、新特性、重要改进
    3. 如果有特别重要的更新（如新功能、重大改进），用 **加粗** 标记
    4. 摘要控制在150字左右
    5. 如果内容全部是修复或测试相关，返回 "无重要更新"
    6. 摘要中不得包含任何URL链接或网址
    7. 摘要中不得包含小红书违禁词和敏感词

    重要：全部内容必须使用中文撰写，专有名词（如产品名、技术术语、函数名等）可保留英文原文。

    请直接返回摘要内容，不要包含版本号和发布时间。
