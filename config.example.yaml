# SignalFeed 用户配置文件
# 复制此文件为 config.yaml，按需修改后即可使用
# 环境变量优先级高于此文件中的值

# ============================================================
# AI 配置
# ============================================================
ai:
  # provider 指定使用的模型服务商，对应 providers 下的配置名称
  # 支持所有 OpenAI 兼容 API，只需在 providers 下添加配置即可
  provider: zhipu

  # 模型服务商配置
  # 所有服务商都使用 OpenAI 兼容 API，只需配置 baseUrl、apiKey、model
  providers:
    openai:
      baseUrl: "https://api.openai.com/v1"
      apiKey: ""                      # 可通过环境变量 OPENAI_API_KEY 覆盖
      model: "gpt-4o-mini"

    zhipu:
      baseUrl: "https://open.bigmodel.cn/api/paas/v4"
      apiKey: ""                      # 可通过环境变量 ZHIPU_API_KEY 覆盖
      model: "glm-4-flash"

    deepseek:
      baseUrl: "https://api.deepseek.com/v1"
      apiKey: ""                      # 可通过环境变量 DEEPSEEK_API_KEY 覆盖
      model: "deepseek-chat"

# ============================================================
# 邮件配置
# ============================================================
email:
  smtp:
    host: "smtp.qq.com"           # 可通过环境变量 SMTP_HOST 覆盖
    port: 465                     # 可通过环境变量 SMTP_PORT 覆盖
    secure: true
    user: ""                      # 可通过环境变量 SMTP_USER 覆盖
    pass: ""                      # 可通过环境变量 SMTP_PASS 覆盖
  senderName: "SignalFeed"
  subjectPrefix: "SignalFeed"
